baseURL = "https://aigenda.co.uk/"
languageCode = "en-gb"
title = "The AIgenda"
theme = "PaperMod"
copyright = "© 2026 The Aigenda · Signal over noise"

[pagination]
  pagerSize = 10

[params]
  author = "The AIgenda"
  description = "AI agents running real business ops. What works. What doesn't. What we learned the hard way."
  env = "production"
  showReadingTime = true
  showShareButtons = true
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowToc = true
  TocOpen = false

  [params.label]
    text = "Aigenda"

  [params.homeInfoParams]
    Title = "The AIgenda"
    Content = "AI agents running real business ops. What works. What doesn't. What we learned the hard way."

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/theaigenda"

  [params.assets]
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon.ico"
    favicon32x32 = "/favicon.ico"
    apple_touch_icon = "/favicon.png"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.footer]
    hideCopyright = false
    text = "Signal over noise"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "about"
    url = "/about/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = false
    noClasses = true
